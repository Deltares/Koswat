name: "Code Cleanup"

on:
  push:
    branches: [ master ]

env:
  AUTOFORMAT_COMMIT_MSG: "chore: autoformat with isort & black"
  BOT_USER_NAME: "github-actions[bot]"
  BOT_USER_EMAIL: "41898282+github-actions[bot]@users.noreply.github.com"
  PIXI_VERSION: "v0.62.2"

jobs:
  code-autoformat:
    # Skip if this push was itself triggered by the autoformat bot or a version bump
    if: |
      !startsWith(github.event.head_commit.message, 'chore: autoformat') &&
      !startsWith(github.event.head_commit.message, 'bump:')
    name: Normalize code with internal standards
    runs-on: ubuntu-latest
    permissions:
      actions: write
    defaults:
      run:
        shell: bash -l {0}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.BYPASS_PROTECTED_BRANCHES_PAT }}

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: ${{ env.PIXI_VERSION }}
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'master' }}

      - name: Run isort & black
        run: pixi run -e dev code-cleanup

      - name: Set GIT identity
        run: |
          git config --global user.name "${{ env.BOT_USER_NAME }}"
          git config --global user.email "${{ env.BOT_USER_EMAIL }}"
          git remote set-url origin https://x-access-token:${{ secrets.BYPASS_PROTECTED_BRANCHES_PAT }}@github.com/$GITHUB_REPOSITORY

      - name: Commit and push formatting changes
        run: |
          if git diff --quiet; then
            echo "No formatting changes detected, skipping commit."
            exit 0
          fi
          git commit -am "${{ env.AUTOFORMAT_COMMIT_MSG }}"
          git push || { echo "ERROR: Failed to push formatting changes."; exit 1; }