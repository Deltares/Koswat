name: "Generate release"

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      is_prerelease:
        description: "Generate a release candidate (pre-release)"
        required: false
        type: boolean
        default: false
      release_title:
        description: "Release title suffix (e.g. '2026.Q4 Sprint'). Leave empty to auto-generate."
        required: false
        type: string

env:
  GH_TOKEN: ${{ secrets.BYPASS_PROTECTED_BRANCHES_PAT }}

jobs:
  bump-and-release:
    name: "Bump version and generate GitHub release"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.BYPASS_PROTECTED_BRANCHES_PAT }}

      - uses: prefix-dev/setup-pixi@v0.9.0
        with:
          pixi-version: v0.49.0
          cache: true
          cache-write: false

      - name: Set GIT identity
        run: |
          PAT_USER=$(gh api user | jq -r '.login')
          git config --global user.name "${PAT_USER}"
          git config --global user.email "${PAT_USER}@users.noreply.github.com"

      - name: Set release title
        run: |
          YEAR=$(date +'%Y')
          MONTH=$(date +'%-m')
          QUARTER=$(( (MONTH - 1) / 3 + 1 ))
          INPUT_TITLE="${{ inputs.release_title }}"
          RELEASE_TYPE=$([[ "${{ inputs.is_prerelease }}" == "true" ]] && echo "prerelease" || echo "release")

          if [ -n "${INPUT_TITLE}" ]; then
            echo "RELEASE_TITLE=${INPUT_TITLE} - ${RELEASE_TYPE}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TITLE=${YEAR}.Q${QUARTER} ${{ inputs.bump_type }} ${RELEASE_TYPE}" >> "$GITHUB_ENV"
          fi

      - name: Bump project version
        run: |
          if [ "${{ inputs.is_prerelease }}" == "true" ]; then
            pixi run -e dev cz bump \
              --increment ${{ inputs.bump_type }} \
              --prerelease rc \
              --allow-no-commit \
              --bump-message "release: ${{ env.RELEASE_TITLE }}"
          else
            pixi run -e dev cz bump \
              --increment ${{ inputs.bump_type }} \
              --allow-no-commit \
              --bump-message "release: ${{ env.RELEASE_TITLE }}"
          fi

      - name: Push bumped version and tag
        run: git push --force && git push --tags --force

      - name: Set release variables
        run: |
          echo "RELEASE_TAG=$(git tag --sort=committerdate | grep -o 'v.*' | tail -1)" >> "$GITHUB_ENV"
          echo "OLD_RELEASE_TAG=$(git tag --sort=committerdate | grep -o 'v.*' | tail -2 | head -1)" >> "$GITHUB_ENV"

      - name: Generate GitHub release (pre-release)
        if: inputs.is_prerelease == true
        run: |
          gh release create '${{ env.RELEASE_TAG }}' \
            --verify-tag \
            --prerelease \
            --title '${{ env.RELEASE_TITLE }}' \
            --generate-notes \
            --notes-start-tag '${{ env.OLD_RELEASE_TAG }}'

      - name: Generate GitHub release (stable)
        if: inputs.is_prerelease == false
        run: |
          gh release create '${{ env.RELEASE_TAG }}' \
            --verify-tag \
            --latest \
            --title '${{ env.RELEASE_TITLE }}' \
            --generate-notes \
            --notes-start-tag '${{ env.OLD_RELEASE_TAG }}'
